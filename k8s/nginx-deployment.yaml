apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-static
  labels:
    app: nginx-static
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-static
  template:
    metadata:
      labels:
        app: nginx-static
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: nginx-static-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-static-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head><title>CI/CD Pipeline Demo</title></head>
      <body style="font-family: sans-serif; text-align: center; margin-top: 100px;">
        <h1>Hello from Kubernetes!</h1>
        <p>Deployed by Jenkins via kubectl.</p>
      </body>
    </html>
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-static-service
spec:
  type: NodePort
  selector:
    app: nginx-static
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
